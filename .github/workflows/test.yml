name: CI

on:
    push:
    pull_request:
    workflow_dispatch:

env:
    FOUNDRY_PROFILE: ci

jobs:
    check:
        name: Foundry project
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Install Foundry
              uses: foundry-rs/foundry-toolchain@v1
              with:
                  version: nightly
            - name: Cache Foundry
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.foundry
                      out
                      cache
                  key: foundry-${{ runner.os }}-${{ hashFiles('foundry.toml', 'lib/**') }}
                  restore-keys: |
                      foundry-${{ runner.os }}-
            - name: Show Forge version
              run: |
                  forge --version

            - name: Run Forge fmt
              run: |
                  forge fmt --check
              id: fmt

            - name: Run Forge build
              run: |
                  forge build --via-ir --sizes --optimize
              id: build

            - name: Run Forge tests
              run: |
                  forge test -vvv
              id: test
